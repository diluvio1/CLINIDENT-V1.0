<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CLINIDENT | Iniciar Sesión</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #8aa7a6, #3aa6a0);
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 18px;
            width: 350px;
            text-align: center;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        }
        .input-group { text-align: left; margin-bottom: 15px; }
        label { font-size: 12px; color: #666; font-weight: bold; }
        input, select {
            width: 100%; padding: 11px; border-radius: 6px;
            border: 1px solid #ddd; margin-top: 5px; box-sizing: border-box;
        }
        button {
            width: 100%; padding: 13px; border: none; border-radius: 8px;
            background: #4a8dc7; color: white; font-weight: bold;
            cursor: pointer; margin-top: 10px;
        }
        button:hover { background: #3973a5; }
    </style>
</head>
<body>

    <div class="card">
        <img src="clinident_logo.png" width="80" alt="Logo">
        <h2>Iniciar Sesión</h2>

        <div class="input-group">
            <label>Usuario</label>
            <input type="text" id="user-name" placeholder="Tu nombre">
        </div>

        <div class="input-group">
            <label>Contraseña</label>
            <input type="password" id="user-pass" placeholder="********">
        </div>

        <div class="input-group">
            <label>Acceder como:</label>
            <select id="user-role">
                <option value="paciente">Paciente </option>
                <option value="odontologo">Odontologo </option>
                <option value="recepcion">recepcion </option>
                <option value="admin">Administrador (Mando Total)</option>
            </select>
        </div>
        <button onclick="gestionarAcceso()">Entrar</button>
    </div>

    

    <script>
        function gestionarAcceso() {
            const user = document.getElementById('user-name').value;
            const pass = document.getElementById('user-pass').value;
            const rol = document.getElementById('user-role').value;

            // 1. Verificamos que no esté vacío
            if (user === "" || pass === "") {
                alert("⚠️ Por favor escribe tu usuario y contraseña");
                return;
            }

            console.log("Intentando acceder como: " + rol);

            // 2. Lógica de redirección exacta
            if (rol === "paciente") {
                // IMPORTANTE: El navegador solo abre archivos .html
                // Si tu archivo de Python genera la agenda, asegúrate de que se llame así:
                window.location.href = "Agendacliente.html"; 
            } 
            else if(rol === "recepcion"){
            window.location.href = "facturacion.html";
            }    
           
            else if (rol === "odontologo") {
                window.location.href = "odontologo.html";
            }
            else if (rol === "admin") {
                window.location.href = "admin_panel.html";
            }
        }
    </script>
</body>
</html>
