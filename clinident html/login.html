<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CLINIDENT | Iniciar Sesión</title>

<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root{
    --azul-oscuro:#0f172a;
    --azul:#2563eb;
    --azul-claro:#60a5fa;
    --blanco:#ffffff;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
background: linear-gradient(
    270deg,
    #1d1d63,
    #1e3a8a,
    #0084ff,
    #1e3a8a
);
background-size: 300% 300%;
animation: fondoAnimado 14s ease-in-out infinite;
color:#1e293b;
}
body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    background: linear-gradient(
        270deg,
        #1d1d63,
        #1e3a8a,
        #0084ff,
        #1e3a8a
    );
    background-size: 300% 300%;
    animation: fondoAnimado 14s ease-in-out infinite;

    color:#1e293b;
}

@keyframes fondoAnimado{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}
/* CARD */
.card{
    background: var(--blanco); /* cuadro blanco */
    padding:40px;
    border-radius:20px;
    width:360px;
    text-align:center;
    color: var(--azul-oscuro);
    box-shadow:0 25px 60px rgba(0,0,0,0.2);
    animation:fadeIn 0.6s ease;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

.card img{
    margin-bottom:10px;
}

/* INPUTS */
.input-group{
    text-align:left;
    margin-bottom:15px;
}

label{
    font-size:12px;
    opacity:0.8;
    font-weight:600;
}

input,select{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid #000000;
    margin-top:5px;
    outline:none;
    background:#f9fafb; /* input claro */
    color: var(--azul-oscuro);
}

select {
    color: rgb(110, 110, 110);
    background: rgb(255, 255, 255);
}

/* 👇 ESTA ES LA CLAVE */
select option {
    color: black;
    background: #ffffff;
}
input::placeholder{
    color:#9ca3af;
}

/* EFECTO FOCUS */
input:focus,select:focus{
    box-shadow:0 0 0 2px var(--azul-claro);
    background:#ffffff;
}
.crear-cuenta{
    margin-top:15px;
    font-size:13px;
    color:#64748b;
    cursor:pointer;
}

.crear-cuenta span{
    color: var(--azul);
    font-weight:600;
    transition:0.3s;
}

.crear-cuenta span:hover{
    text-decoration:underline;
    opacity:0.8;
}

/* BOTÓN */
button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,var(--azul),var(--azul-claro));
    color:white;
    font-weight:700;
    cursor:pointer;
    margin-top:15px;
    transition:0.3s;
}

button:hover{
    transform:translateY(-2px) scale(1.03);
    box-shadow:0 10px 25px rgba(0,0,0,0.4);
}
</style>
</head>
<body>

    <div class="card">
        <img src="clinident_logo.png" width="80" alt="Logo">
        <h2>Iniciar Sesión</h2>

        <div class="input-group">
            <label>Correo</label>
            <input type="text" id="user-name" placeholder="Escribe tu correo">
        </div>

        <div class="input-group">
            <label>Contraseña</label>
            <input type="password" id="user-pass" placeholder="********">
        </div>

        <div class="input-group">
            <label>Acceder como:</label>
            <select id="user-role">
                <option value="paciente">Paciente </option>
                <option value="odontologo">Odontologo </option>
                <option value="recepcion">recepcion </option>
                <option value="admin">Administrador </option>
            </select>
        </div>
        <button onclick="gestionarAcceso()">Entrar</button>
        <p class="crear-cuenta" onclick="irARegistro()">
            ¿No tienes cuenta? <span>Créala aquí</span>
        </p>
    </div>

    

    <script>
        function gestionarAcceso() {
            const user = document.getElementById('user-name').value;
            const pass = document.getElementById('user-pass').value;
            const rol = document.getElementById('user-role').value;

            // 1. Verificamos que no esté vacío
            if (user === "" || pass === "") {
                alert("⚠️ Por favor escribe tu usuario y contraseña");
                return;
            }

    // REDIRECCIONES
    if(rol === "paciente"){
        window.location.href = "agenda.html";
    } 
    else if(rol === "odontologo"){
        window.location.href = "odontologo.html";
    }
    else if(rol === "admin"){
        window.location.href = "odontologo.html";
    }
    else{
        window.location.href = "odontologo.html";
    }
}

// PWA
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js')
    .then(() => console.log('Service Worker registrado'))
    .catch(err => console.log('Error:', err));
}
</script>
<script>
function irARegistro(){
    window.location.href = "registro.html";
}
</script>

</body>
</html>
