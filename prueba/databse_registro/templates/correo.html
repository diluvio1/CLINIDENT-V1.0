<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Recuperar por correo</title>
    <style>
        body{
            font-family:Arial;
            background:#3aa6a0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            margin: 0;
        }

        .card{
            background:white;
            padding:40px;
            border-radius:15px;
            width:320px;
            text-align:center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        input{
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            margin-bottom: 15px;
            border-radius: 6px;
            border: 1px solid #ccc;
            box-sizing: border-box; /* Evita que el input se salga de la card */
        }

        button{
            width:100%;
            padding:12px;
            background:#4a8dc7;
            border:none;
            color:white;
            border-radius:6px;
            cursor: pointer;
        }
        
        button:hover {
            background: #3973a5;
        }
    </style>
</head>

<body>
<div class="card">
    <h2>Recuperar por correo</h2>
    <form id="formRecuperar" onsubmit="verificarCorreo(event)">
        <input type="email" id="correoInput" placeholder="usuario@clinident.com" required>
        <button type="submit" id="btnEnviar">Enviar código</button>
    </form>
</div>

<script>
function verificarCorreo(event) {
    event.preventDefault(); // Detiene el salto automático
    
    const input = document.getElementById('correoInput');
    const btn = document.getElementById('btnEnviar');
    const correo = input.value.trim();

    console.log("Intentando verificar el correo:", correo); // Control 1

    btn.innerText = "Verificando...";
    btn.disabled = true;

    const datos = new FormData();
    datos.append('email', correo);

    // LLAMADA AL PHP
    fetch('validar_recuperacion_correo.php', {
        method: 'POST',
        body: datos
    })
    .then(response => {
        console.log("Servidor respondió"); // Control 2
        return response.text();
    })
    .then(data => {
        const respuesta = data.trim();
        console.log("Respuesta exacta del PHP:", respuesta); // Control 3

        if (respuesta === "registrado") {
            alert("✅ Correo encontrado. Redirigiendo...");
            window.location.href = "verificacion.html";
        } else if (respuesta === "no_registrado") {
            alert("❌ Error: Este correo no está registrado en Clinident.");
            btn.innerText = "Enviar código";
            btn.disabled = false;
        } else {
            alert("Error desconocido del servidor: " + respuesta);
            btn.disabled = false;
        }
    })
    .catch(error => {
        console.error("Error en el Fetch:", error);
        alert("No se pudo conectar con el servidor PHP.");
        btn.disabled = false;
    });
}
</script>
