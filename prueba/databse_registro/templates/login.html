<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CLINIDENT | Iniciar Sesión</title>

<style>
:root{
    --azul-oscuro:#0f172a;
    --azul:#2563eb;
    --azul-claro:#60a5fa;
    --blanco:#ffffff;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Plus Jakarta Sans',sans-serif;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);
}

/* CARD */
.card{
    background: var(--blanco); /* cuadro blanco */
    padding:40px;
    border-radius:20px;
    width:360px;
    text-align:center;
    color: var(--azul-oscuro);
    box-shadow:0 25px 60px rgba(0,0,0,0.2);
    animation:fadeIn 0.6s ease;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

.card img{
    margin-bottom:10px;
}

/* INPUTS */
.input-group{
    text-align:left;
    margin-bottom:15px;
}

label{
    font-size:12px;
    opacity:0.8;
    font-weight:600;
}

input,select{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid #cbd5e1;
    margin-top:5px;
    outline:none;
    background:#f9fafb; /* input claro */
    color: var(--azul-oscuro);
}

select {
    color: white;
    background: rgba(255,255,255,0.2);
}

/* 👇 ESTA ES LA CLAVE */
select option {
    color: black;
    background: white;
}
input::placeholder{
    color:#9ca3af;
}

/* EFECTO FOCUS */
input:focus,select:focus{
    box-shadow:0 0 0 2px var(--azul-claro);
    background:#ffffff;
}

/* BOTÓN */
button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,var(--azul),var(--azul-claro));
    color:white;
    font-weight:700;
    cursor:pointer;
    margin-top:15px;
    transition:0.3s;
}

button:hover{
    transform:translateY(-2px) scale(1.03);
    box-shadow:0 10px 25px rgba(0,0,0,0.4);
}
</style>
</head>

<body>

<div class="card">

<img src="clinident_logo.png" width="100" height="100">

<h2>Iniciar Sesión</h2>

<form id="formLogin" onsubmit="validarAcceso(event)">

<div class="input-group">
    <label>Correo electrónico</label>
    <input type="text" id="correo" placeholder="nombre@correo.com">
</div>

<div class="input-group">
    <label>Contraseña</label>
    <input type="password" id="pass" placeholder="********">
</div>


<button type="submit">Entrar</button>

</form>

<div class="links">
    <a href="recuperar.html">¿Olvidaste tu contraseña?</a>
    <a href="/registro">Crear cuenta</a> </div>

</div>

</div>
<script>
function validarAcceso(event) {
    event.preventDefault();

    const inputCorreo = document.getElementById('correo');
    const inputPass = document.getElementById('pass');

    if (!inputCorreo || !inputPass) {
        alert("Error: No se encuentran los campos.");
        return;
    }

    const datos = new FormData();
    datos.append('usuario', inputCorreo.value);
    datos.append('password', inputPass.value);

    fetch('/validar_login', {
        method: 'POST',
        body: datos
    })
    .then(response => response.json())  // <- Cambiado a JSON
    .then(data => {
        console.log("Respuesta del servidor:", data);

        if (data.status === 'success') {
            alert("¡Bienvenido, " + data.nombre + "!");
            window.location.href = data.redirect;  // <- Flask decide a dónde va
        } else if (data.msg === 'incorrecto') {
            alert("❌ Contraseña incorrecta.");
        } else if (data.msg === 'no_existe') {
            alert("❌ Este usuario no está registrado.");
        } else {
            alert("Error: " + data.msg);
        }
    })
    .catch(error => {
        console.error(error);
        alert("Error de conexión con el servidor.");
    });
}
</script>
</body>
</html>
